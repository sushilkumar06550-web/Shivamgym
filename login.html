<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#f1f5f9;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

.btn-blue{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
color:white;
cursor:pointer;
}

.btn-yellow{
width:100%;
padding:12px;
background:#facc15;
border:none;
cursor:pointer;
margin-top:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>Member Login</h2>

<input placeholder="Name">
<input placeholder="Password" type="password">

<button class="btn-blue" onclick="alert('Welcome 💪 Member Access')">
Login
</button>

<button class="btn-yellow" onclick="window.location.href='index.html'">
Home
</button>
</div>

</body>
</html>
