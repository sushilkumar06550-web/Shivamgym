<!DOCTYPE html>
<html>
<head>

<title>Join Gym</title>

<style>

}

.box{
padding:30px;
background:#f1f5f9;

}

input,select{

.btn-blue{

}

.btn-yellow{
width:100%;
padding:12px;

}

</head>

<body>

<div class="box">

<input placeholder="Name">
<input placeholder="Age">

<select>

</select>

<button class="btn-blue" onclick="alert('Request Sent 💪')">Join</button>

</html>
